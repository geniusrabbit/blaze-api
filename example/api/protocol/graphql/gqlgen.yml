# Generate the server inside the folder
# > go run github.com/99designs/gqlgen

schema:
  - ../../../../protocol/graphql/schemas/*.graphql
  - ../../../../repository/**/*.graphql
  - ../../../../repository/user/delivery/graphql/user_base/*.graphql
  - ./extensions/*.graphql

skip_mod_tidy: true

exec:
  filename: ../../internal/server/graphql/generated/exec.go
  package: generated

model:
  filename: ../../internal/server/graphql/models/generated.go
  package: models

autobind:
  - github.com/geniusrabbit/blaze-api/server/graphql/models
  # - github.com/geniusrabbit/blaze-api/server/graphql/types
  # - github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors

resolver:
  layout: follow-schema
  dir: ../../internal/server/graphql/resolvers
  package: resolvers

omit_slice_element_pointers: false
skip_validation: true

# Extended Account/UserList* generate in example/models; shared types bind to blaze-api.
models:
  ## Default scalar types (shared with blaze-api)
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int64:
    model:
      - github.com/99designs/gqlgen/graphql.Int64
  ## Custom scalar types (shared with blaze-api)
  Time:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.Time
  TimeDuration:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.TimeDuration
  DateTime:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.DateTime
  JSON:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.JSON
  NullableJSON:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.NullableJSON
  UUID:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.UUID
  ID64:
    model: github.com/geniusrabbit/blaze-api/server/graphql/types.ID64
  ## Account and User types (extended in example/models)
  UserConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.UserConnection
  MemberConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.MemberConnection
  AccountConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.AccountConnection
  ## Basic connection types (extended in example/models)
  SocialAccountConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.SocialAccountConnection
  RBACRoleConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.RBACRoleConnection
  AuthClientConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.AuthClientConnection
  HistoryActionConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.HistoryActionConnection
  OptionConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.OptionConnection
  DirectAccessTokenConnection:
    model: github.com/geniusrabbit/blaze-api/example/api/internal/server/graphql/connectors.DirectAccessTokenConnection
